<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SchoolExams - Evolution Lab</title>
    <style>
        :root {
            --bg0: #000814; --bg1: #001d3d; --bg2: #003566;
            --p0: #0077b6; --p1: #90e0ef; --p2: #03045e;
            --w: #caf0f8; 
            --glass: rgba(0, 29, 61, 0.85);
            --shadow: 0 12px 40px rgba(0,0,0,0.7);
            --glow: 0 0 20px rgba(144, 224, 239, 0.4);
            --gold: #ffd700;
            --evo: #ff0055;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg0); color: var(--w);
            margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 0, 85, 0.1) 0%, var(--bg0) 70%);
            min-height: 100vh;
        }

        .btn-back { align-self: flex-start; background: var(--glass); border: 1px solid var(--evo); color: var(--w); padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; transition: 0.3s; }
        .btn-back:hover { background: var(--evo); color: #fff; box-shadow: 0 0 15px var(--evo); transform: translateX(-5px); }

        .header-title { color: var(--evo); font-size: 40px; text-shadow: 0 0 20px rgba(255,0,85,0.5); margin-bottom: 5px; text-transform: uppercase; font-weight: 900; letter-spacing: 2px;}
        .header-sub { color: gray; margin-bottom: 40px; font-size: 16px; }

        .currency-bar { background: var(--glass); border: 2px solid var(--p0); padding: 15px 30px; border-radius: 20px; display: flex; gap: 30px; font-size: 18px; font-weight: bold; box-shadow: var(--shadow); margin-bottom: 40px; }
        .currency-bar span { color: var(--gold); } .currency-bar .gems { color: #00ffcc; }

        .evo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1000px; }

        .evo-card {
            background: var(--bg1); border: 2px solid var(--line); border-radius: 16px; padding: 25px; 
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; text-align: center;
            position: relative; overflow: hidden;
        }
        .evo-card:hover { border-color: var(--evo); transform: translateY(-5px); box-shadow: 0 0 25px rgba(255,0,85,0.3); }
        
        .evo-path { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; width: 100%; justify-content: center; }
        .evo-icon { width: 70px; height: 70px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); background: rgba(0,0,0,0.4); border-radius: 12px; padding: 10px; border: 1px solid var(--line); }
        .arrow { font-size: 30px; color: var(--evo); animation: pulseArrow 1s infinite alternate; }

        .progress-container { width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; height: 20px; margin-bottom: 10px; border: 1px solid var(--line); position: relative; overflow: hidden;}
        .progress-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #ffaa00); width: 0%; transition: width 0.5s; }
        .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        .btn { background: var(--evo); color: #fff; border: none; padding: 15px 25px; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; margin-top: 15px; }
        .btn:hover { background: #ff3377; box-shadow: 0 0 20px var(--evo); }
        .btn:disabled { background: #333 !important; color: #777 !important; cursor: not-allowed; box-shadow: none !important; }

        @keyframes pulseArrow { from { transform: translateX(-5px); opacity: 0.5; } to { transform: translateX(5px); opacity: 1; } }

        /* Animation Full Screen Overlay */
        .evo-anim-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .evo-anim-overlay.active { display: flex; }
        .dna-spin { font-size: 80px; animation: spin 2s linear infinite; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--evo)); }
        .success-text { color: var(--evo); font-size: 40px; font-weight: 900; display: none; text-shadow: 0 0 30px var(--evo); text-align: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<a href="../" class="btn-back">← Return to Portal</a>

<div class="header-title">Evolution Lab</div>
<div class="header-sub">Unlock true power by merging max-level pets with pure energy.</div>

<div class="currency-bar">
    <div>🪙 <span id="coinUI">0</span> Coins</div>
    <div>💎 <span id="gemUI" class="gems">0</span> Gems</div>
</div>

<div class="evo-grid" id="evoGrid">
    <div style="color: gray;">Loading laboratory data...</div>
</div>

<div class="evo-anim-overlay" id="animOverlay">
    <div class="dna-spin" id="dnaIcon">🧬</div>
    <div class="success-text" id="successText">EVOLUTION COMPLETE!<br><span id="newPetName" style="color: #fff; font-size: 30px;"></span></div>
    <button class="btn" id="closeAnimBtn" style="display: none; max-width: 200px; margin-top: 30px;" onclick="closeAnim()">CONTINUE</button>
</div>

<script>
    let state = { coins: 0, gems: 0, owned_pets: [], levels: {}, catalog: {} };

    async function api(action, data = {}) {
        const fd = new FormData();
        fd.append('action', action);
        for (let key in data) fd.append(key, data[key]);
        const res = await fetch('../evolve_backend.php', { method: 'POST', body: fd });
        return await res.json();
    }

    function renderUI() {
        document.getElementById('coinUI').innerText = state.coins.toLocaleString();
        document.getElementById('gemUI').innerText = state.gems.toLocaleString();
        const grid = document.getElementById('evoGrid');
        grid.innerHTML = '';

        for (const [base_id, info] of Object.entries(state.catalog)) {
            let isOwned = state.owned_pets.includes(base_id);
            let hasEvolvedAlready = state.owned_pets.includes(info.target_id);
            let currentLevel = state.levels[base_id] || 0;
            let progressPct = Math.min((currentLevel / info.req_level) * 100, 100);
            
            let statusText = "";
            let btnDisabled = true;

            if (hasEvolvedAlready) {
                statusText = `<span style="color: #3ba55c; font-weight: bold;">Evolution Unlocked ✓</span>`;
                progressPct = 100;
            } else if (!isOwned) {
                statusText = `<span style="color: gray;">Base Pet Not Owned</span>`;
            } else if (currentLevel < info.req_level) {
                statusText = `<span style="color: #ffaa00;">Level too low!</span>`;
            } else {
                statusText = `<span style="color: #00ffcc; font-weight: bold;">Ready to Evolve!</span>`;
                btnDisabled = false;
            }

            let currencyIcon = info.currency === 'gems' ? '💎' : '🪙';

            grid.innerHTML += `
                <div class="evo-card" style="border-color: ${hasEvolvedAlready ? '#3ba55c' : 'var(--line)'}">
                    <h3 style="margin-top: 0; color: ${info.color};">${info.target_name}</h3>
                    
                    <div class="evo-path">
                        <div class="evo-icon" style="font-size: 40px; display: flex; align-items:center; justify-content:center;">🐾</div>
                        <div class="arrow">➞</div>
                        <img src="${info.img}" class="evo-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/811/811559.png'" style="border-color: ${info.color}; box-shadow: 0 0 15px ${info.color};">
                    </div>

                    <div style="font-size: 13px; margin-bottom: 10px;">Requires: ${info.base_name} (Lvl ${info.req_level})</div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${progressPct}%; ${hasEvolvedAlready ? 'background: #3ba55c;' : ''}"></div>
                        <div class="progress-text">Lvl ${currentLevel} / ${info.req_level}</div>
                    </div>

                    <div style="margin-bottom: 10px; font-size: 14px;">${statusText}</div>

                    <button class="btn" ${btnDisabled ? 'disabled' : ''} onclick="evolvePet('${base_id}')">
                        ${hasEvolvedAlready ? 'EVOLVED' : `EVOLVE FOR ${info.cost.toLocaleString()} ${currencyIcon}`}
                    </button>
                </div>
            `;
        }
    }

    async function loadData() {
        const res = await api('load');
        if(res.success) {
            state = { coins: res.coins, gems: res.gems, owned_pets: res.owned_pets, levels: res.levels, catalog: res.catalog };
            renderUI();
        } else alert(res.message);
    }

    async function evolvePet(base_id) {
        const res = await api('evolve', { base_id: base_id });
        if(res.success) {
            // Show Animation
            const overlay = document.getElementById('animOverlay');
            const dna = document.getElementById('dnaIcon');
            const success = document.getElementById('successText');
            const closeBtn = document.getElementById('closeAnimBtn');
            
            document.getElementById('newPetName').innerText = res.target_name;
            overlay.classList.add('active');
            dna.style.display = 'block';
            success.style.display = 'none';
            closeBtn.style.display = 'none';

            // Fake suspense wait, then reveal
            setTimeout(() => {
                dna.style.display = 'none';
                success.style.display = 'block';
                closeBtn.style.display = 'block';
                loadData(); // Reload stats while animation plays
            }, 2500);

        } else {
            alert("❌ " + res.message);
        }
    }

    function closeAnim() { document.getElementById('animOverlay').classList.remove('active'); }

    loadData();
</script>
</body>
</html>
