<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Of Fame - SchoolExams</title>
    <style>
        :root {
            --bg0: #000814; --bg1: #001d3d; --bg2: #003566;
            --p0: #0077b6; --p1: #90e0ef; --p2: #03045e;
            --line: rgba(144, 224, 239, 0.2);
            --glow: 0 0 20px rgba(144, 224, 239, 0.4);
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }

        body { 
            background: var(--bg0); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; 
            text-align: center; padding: 40px 20px; overflow-x: hidden; margin: 0; min-height: 100vh;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .btn-back { align-self: flex-start; background: rgba(0, 0, 0, 0.85); border: 1px solid var(--p0); color: var(--p1); padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 900; text-transform: uppercase; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .btn-back:hover { background: var(--p0); color: #fff; box-shadow: var(--glow); transform: translateX(-5px); }

        .header h1 { color: var(--gold); font-size: 3.5rem; margin: 0 0 10px 0; text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: #caf0f8; font-size: 1.1rem; margin: 0 0 20px 0; }

        /* SEASON TIMER STYLES */
        .season-box {
            background: rgba(0, 29, 61, 0.9); border: 2px solid #00ffcc; border-radius: 16px;
            padding: 15px 30px; display: inline-block; margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        .season-title { color: #00ffcc; font-weight: 900; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; margin-bottom: 8px; }
        .season-timer { font-size: 32px; font-family: monospace; font-weight: bold; color: #fff; text-shadow: 0 0 10px #00ffcc; letter-spacing: 2px; }
        .season-reward { font-size: 13px; color: #aaa; margin-top: 8px; font-weight: bold; }
        .season-reward span { color: var(--gold); }

        .leaderboard-container { max-width: 800px; margin: 0 auto; background: rgba(0, 29, 61, 0.85); border: 2px solid var(--p0); border-radius: 20px; padding: 20px; box-shadow: var(--glow); backdrop-filter: blur(10px); }
        
        .lb-row { display: flex; align-items: center; background: var(--bg0); margin-bottom: 10px; padding: 15px 20px; border-radius: 12px; border: 1px solid var(--line); transition: 0.3s; }
        .lb-row:hover { transform: scale(1.02); border-color: var(--p1); box-shadow: var(--glow); z-index: 10; position: relative; }
        
        .lb-rank { font-size: 24px; font-weight: 900; width: 50px; text-align: left; color: #888; }
        
        /* Top 3 Styling */
        .rank-1 { border-color: var(--gold); background: linear-gradient(90deg, rgba(255, 215, 0, 0.1), var(--bg0)); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .rank-1 .lb-rank { color: var(--gold); text-shadow: 0 0 10px var(--gold); font-size: 32px; }
        .rank-1 .lb-pfp { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        
        .rank-2 { border-color: var(--silver); background: linear-gradient(90deg, rgba(192, 192, 192, 0.1), var(--bg0)); }
        .rank-2 .lb-rank { color: var(--silver); text-shadow: 0 0 10px var(--silver); font-size: 28px; }
        .rank-2 .lb-pfp { border-color: var(--silver); box-shadow: 0 0 10px var(--silver); }
        
        .rank-3 { border-color: var(--bronze); background: linear-gradient(90deg, rgba(205, 127, 50, 0.1), var(--bg0)); }
        .rank-3 .lb-rank { color: var(--bronze); text-shadow: 0 0 10px var(--bronze); font-size: 26px; }
        .rank-3 .lb-pfp { border-color: var(--bronze); box-shadow: 0 0 10px var(--bronze); }

        .lb-pfp { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--p1); margin-right: 20px; background: #fff; }
        
        .lb-user { flex: 1; text-align: left; font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 1px; }
        
        .lb-prestige { font-size: 22px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); display: flex; align-items: center; gap: 8px; }
        .lb-prestige span { font-size: 14px; color: #aaa; font-weight: normal; text-shadow: none; }

        .loading { font-size: 20px; color: var(--p1); padding: 40px; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div style="text-align: left; max-width: 800px; margin: 0 auto;">
        <a href="../" class="btn-back">← Return to Portal</a>
    </div>

    <div class="header">
        <h1>🏆 Hall Of Fame</h1>
        <p>The most prestigious scholars in the digital realm.</p>
    </div>

    <div class="season-box">
        <div class="season-title">Season Ends In</div>
        <div class="season-timer" id="seasonTimer">00d 00h 00m 00s</div>
        <div class="season-reward">Top 10 players receive the <span>💎 Gem Beast</span> at reset!</div>
    </div>

    <div class="leaderboard-container" id="lbContainer">
        <div class="loading">Loading Top Players...</div>
    </div>

<script>
    // --- SEASON TIMER LOGIC ---
    function updateTimer() {
        const now = new Date();
        // Get the very last millisecond of the current month
        const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59).getTime();
        const distance = endOfMonth - now.getTime();

        if (distance < 0) {
            document.getElementById("seasonTimer").innerText = "RESETTING...";
            return;
        }

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("seasonTimer").innerText = 
            `${d.toString().padStart(2, '0')}d ` +
            `${h.toString().padStart(2, '0')}h ` +
            `${m.toString().padStart(2, '0')}m ` +
            `${s.toString().padStart(2, '0')}s`;
    }
    
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- LEADERBOARD LOGIC ---
    async function loadLeaderboard() {
        try {
            const formData = new FormData();
            formData.append('action', 'get_leaderboard');
            
            const res = await fetch('../backend.php', { method: 'POST', body: formData });
            const result = await res.json();
            
            const container = document.getElementById('lbContainer');
            container.innerHTML = '';

            if (result.success && result.data.length > 0) {
                result.data.forEach((player, index) => {
                    let rank = index + 1;
                    let rankClass = rank <= 3 ? `rank-${rank}` : '';
                    let displayRank = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                    
                    let pfpSrc = player.profile_pic ? player.profile_pic : `https://api.dicebear.com/7.x/bottts/svg?seed=${player.username}`;
                    let pLevel = parseInt(player.prestige_level) || 0;
                    
                    container.innerHTML += `
                        <div class="lb-row ${rankClass}">
                            <div class="lb-rank">${displayRank}</div>
                            <img src="${pfpSrc}" class="lb-pfp" alt="PFP" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Guest'">
                            <div class="lb-user">${player.username}</div>
                            <div class="lb-prestige">
                                <span>Prestige</span> ⭐ ${pLevel}
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<div style="color: gray; padding: 40px;">No players found on the server.</div>';
            }
        } catch (e) {
            document.getElementById('lbContainer').innerHTML = '<div style="color: #ff4444; padding: 40px;">Failed to connect to the Hall of Fame server.</div>';
        }
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000); // Auto-refresh every 30 seconds
</script>

</body>
</html>
