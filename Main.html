            --glass: rgba(0, 29, 61, 0.85);
            --shadow: 0 12px 40px rgba(0,0,0,0.7);
            --r: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg0); color: var(--w); overflow-x: hidden; }
        
        .bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 40px 40px; }
        
        header.topbar { position: fixed; top: 0; left:0; right:0; height: 70px; background: rgba(0, 29, 61, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--p0); display: flex; align-items: center; padding: 0 30px; z-index: 1000; justify-content: space-between; }
        
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 24px; color: var(--p1); text-decoration: none; letter-spacing: -1px; }
        .brand img { height: 45px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        .coin-tracker { background: rgba(0,0,0,0.5); border: 1px solid var(--p1); padding: 8px 16px; border-radius: 20px; font-weight: 800; color: #ffd700; display: flex; align-items: center; gap: 8px; font-size: 14px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .coin-tracker span { color: #fff; font-size: 16px; }

        .btn-nav { background: var(--p2); border: 1px solid var(--p0); color: var(--w); padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 14px; }
        .btn-nav:hover { background: var(--p0); color: #fff; box-shadow: 0 0 15px rgba(144, 224, 239, 0.4); transform: translateY(-2px); }

        .main { padding: 110px 24px 40px; max-width: 1400px; margin: 0 auto; text-align: center; }
        .hero { margin-bottom: 20px; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; color: var(--p1); text-shadow: 0 0 20px rgba(144, 224, 239, 0.3); letter-spacing: -1px; }
        
        .stats-bar { display: inline-flex; gap: 30px; background: var(--glass); padding: 12px 30px; border-radius: 30px; border: 1px solid var(--p0); margin-bottom: 30px; font-size: 15px; color: var(--w); font-weight: 700; box-shadow: var(--shadow); }
        .stats-bar span strong { color: var(--p1); font-size: 18px; }

        .searchWrap input { width: 100%; max-width: 800px; padding: 18px 24px; border-radius: var(--r); background: var(--glass); border: 2px solid var(--p2); color: #fff; font-size: 16px; outline: none; transition: 0.3s; box-shadow: var(--shadow); margin: 0 auto; display: block; }
        .searchWrap input:focus { border-color: var(--p1); box-shadow: 0 0 20px rgba(144, 224, 239, 0.3); background: var(--bg1); }

        .gamesGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 30px; text-align: left; }
        .gameCard { background: var(--bg1); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; cursor: pointer; transition: 0.3s; }
        .gameCard:hover { transform: translateY(-8px); border-color: var(--p1); box-shadow: 0 0 20px rgba(144, 224, 239, 0.3); }
        .gameIcon { height: 80px; background: linear-gradient(135deg, var(--p2), var(--bg0)); display: flex; align-items: center; justify-content: center; font-size: 32px; border-bottom: 1px solid var(--line); }
        .gameName { padding: 12px 10px; font-size: 11px; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--w); }

        .overlay { position: fixed; inset: 0; background: var(--bg0); z-index: 2000; display: none; flex-direction: column; }
        .overlay.open { display: flex; }
        .overlay-bar { height: 60px; background: var(--bg1); display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--p0); justify-content: space-between; }
        .bar-title { font-weight: 900; color: var(--p1); font-size: 16px; letter-spacing: 1px; }
        .btn-close { background: #d00000; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 900; transition: 0.2s; }
        .btn-close:hover { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        iframe { flex: 1; border: none; background: #000; }

        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--p0); color: #fff; padding: 16px 24px; border-radius: 12px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: translateY(100px); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>

function updateStatsUI() {
    document.getElementById('coinDisplay').innerText = examCoins.toLocaleString();

}

function showToast(msg) {
    const toast = document.getElementById('coinToast');
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
}

function getIconForGame(name) {
    const n = name.toLowerCase();
    if (n.includes('car') || n.includes('drive') || n.includes('rider') || n.includes('moto')) return '🏎️';
    if (n.includes('space') || n.includes('alien') || n.includes('galaxy') || n.includes('astro')) return '🚀';
    if (n.includes('mine') || n.includes('craft') || n.includes('block') || n.includes('build')) return '⛏️';
    if (n.includes('ball') || n.includes('basket') || n.includes('soccer') || n.includes('fifa')) return '⚽';
    if (n.includes('math') || n.includes('logic') || n.includes('2048') || n.includes('puzzle')) return '🧩';
    if (n.includes('fight') || n.includes('combat') || n.includes('war') || n.includes('strike')) return '⚔️';
    if (n.includes('fnaf') || n.includes('horror') || n.includes('scary') || n.includes('zombie')) return '👻';
    if (n.includes('module')) return '📂';
    return '📘';
}

function renderGrid(filter = "") {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = "";
    
    GAMES.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
        const card = document.createElement('div');
        card.className = 'gameCard';
        card.onclick = () => openGame(game.f, game.name);
        
        const icon = getIconForGame(game.name);
        
        card.innerHTML = `
            <div class="gameIcon">${icon}</div>
            <div class="gameName">${game.name}</div>
        `;
        grid.appendChild(card);
    });
}

function openGame(file, title) {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    document.getElementById('activeTitle').textContent = title;
    
    gameStartTime = Date.now();
    let count = parseInt(localStorage.getItem('schoolExamsGamesOpened') || '0');
    localStorage.setItem('schoolExamsGamesOpened', count + 1);
    updateStatsUI();

    frame.src = file.startsWith('http') ? file : BASE_URL + file;
    overlay.classList.add('open');
    document.body.style.overflow = "hidden";
}

function closeGame() {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    
    if (gameStartTime) {
        let sessionTimeMins = Math.floor((Date.now() - gameStartTime) / 60000); 
        if (sessionTimeMins < 1 && (Date.now() - gameStartTime) > 5000) sessionTimeMins = 1; 
        
        let totalTimeMins = parseInt(localStorage.getItem('schoolExamsPlayTimeMins') || '0');
        localStorage.setItem('schoolExamsPlayTimeMins', totalTimeMins + sessionTimeMins);
        gameStartTime = null;
    }

    frame.src = "about:blank";
    overlay.classList.remove('open');
    document.body.style.overflow = "auto";
    
    updateStatsUI();
}

document.getElementById('searchInput').oninput = (e) => renderGrid(e.target.value);

updateStatsUI();
renderGrid();
</script>
